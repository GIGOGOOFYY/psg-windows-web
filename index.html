<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pakistan Safety Glass — Window Quotation System</title>
<style>
  :root{
    --bg:#eef2f7; --panel:#ffffff; --panel2:#f7f9fc; --line:#dbe3ee; --text:#0f1b2d; --muted:#5f7186;
    --accent:#1f6feb; --accent2:#0d4fb8; --green:#0f9d6b; --amber:#d98a00; --danger:#e5484d;
    --chip:#eaf1fb; --shadow:0 1px 3px rgba(16,32,60,.08),0 8px 24px rgba(16,32,60,.06); --radius:12px;
  }
  [data-theme="dark"]{
    --bg:#0c1119; --panel:#141b26; --panel2:#0f1620; --line:#26313f; --text:#e7eef7; --muted:#8ea0b4;
    --accent:#4a8dff; --accent2:#2f7bff; --green:#20c48a; --amber:#f0b23a; --danger:#ff5d5d;
    --chip:#1b2534; --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.45}
  h1,h2,h3,h4{margin:0 0 .4em}
  a{color:var(--accent);text-decoration:none}
  button{font-family:inherit;font-size:14px;cursor:pointer;border:none;border-radius:9px;padding:9px 14px;
    background:var(--accent);color:#fff;font-weight:600;transition:filter .12s,background .12s}
  button:hover{filter:brightness(1.06)}
  button.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  button.ghost:hover{background:var(--chip)}
  button.sm{padding:6px 10px;font-size:13px;border-radius:8px}
  button.danger{background:var(--danger)} button.green{background:var(--green)} button.amber{background:var(--amber)}
  input,select,textarea{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--line);
    border-radius:8px;background:var(--panel);color:var(--text);width:100%}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
  input:disabled,select:disabled{opacity:.5;cursor:not-allowed}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 3px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .app{display:flex;min-height:100vh}
  .side{width:230px;background:var(--panel);border-right:1px solid var(--line);padding:16px 12px;
    display:flex;flex-direction:column;gap:3px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;border-bottom:1px solid var(--line);margin-bottom:8px}
  .brand .logo{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;letter-spacing:-.5px}
  .brand b{font-size:14px;line-height:1.15}.brand small{color:var(--muted);font-size:11px}
  .nav{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;color:var(--text);font-weight:600;font-size:13.5px;cursor:pointer}
  .nav:hover{background:var(--chip)} .nav.active{background:var(--accent);color:#fff}
  .nav .ic{width:18px;text-align:center}
  .side .spacer{flex:1}
  .cloud-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#8a97a6;margin-right:4px}
  .cloud-dot.on{background:var(--green)} .cloud-dot.err{background:var(--danger)}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--line);
    background:var(--panel);position:sticky;top:0;z-index:20}
  .topbar h2{margin:0;font-size:17px}.topbar .sub{color:var(--muted);font-size:12.5px}
  .content{padding:22px;max-width:1240px;width:100%;margin:0 auto}
  .row{display:flex;gap:14px;flex-wrap:wrap}.grid{display:grid;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card .hd{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .card .bd{padding:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .stat .k{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);font-size:13px}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  tbody tr:hover{background:var(--panel2)} .right{text-align:right}.center{text-align:center}
  .chip{display:inline-block;padding:2px 9px;border-radius:20px;background:var(--chip);font-size:11.5px;font-weight:700;color:var(--muted)}
  .chip.g{background:rgba(15,157,107,.14);color:var(--green)} .chip.a{background:rgba(217,138,0,.15);color:var(--amber)}
  .muted{color:var(--muted)}
  .field{margin-bottom:12px}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .f4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--text);
    color:var(--bg);padding:11px 20px;border-radius:10px;font-weight:600;box-shadow:var(--shadow);transition:transform .28s;z-index:200}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .modal-bg{position:fixed;inset:0;background:rgba(6,12,22,.55);display:none;align-items:flex-start;justify-content:center;
    z-index:60;padding:30px 16px;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:920px;border:1px solid var(--line)}
  .modal .hd{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal .bd{padding:20px}.modal .ft{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .cattile{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);cursor:pointer;transition:transform .1s,box-shadow .1s}
  .cattile:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent)}
  .cattile .ph{height:120px;background:var(--panel2);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .cattile .ph img{max-width:100%;max-height:100%;object-fit:contain}
  .cattile .cap{padding:9px 11px}.cattile .cap b{font-size:12.5px;display:block}
  .empty{text-align:center;padding:48px 20px;color:var(--muted)}.empty .big{font-size:34px;margin-bottom:8px}
  .bd-line{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px dashed var(--line)}
  .bd-line.tot{border-bottom:none;font-weight:800;font-size:15px;padding-top:10px;border-top:2px solid var(--line);margin-top:4px}
  .winrow{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--panel)}
  .winrow .wh{padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
  .winrow .wh img{width:44px;height:44px;object-fit:contain;background:var(--panel2);border-radius:8px}
  .winrow .wb{padding:0 14px 14px;border-top:1px solid var(--line);display:none}
  .winrow.open .wb{display:block}
  .badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--chip);color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:transparent;color:var(--muted);border-radius:0;padding:8px 14px;font-size:13px}
  .seg button.on{background:var(--accent);color:#fff}
  @media(max-width:820px){.side{position:fixed;left:-240px;z-index:50;transition:left .2s}.side.open{left:0}
    .f2,.f3,.f4{grid-template-columns:1fr}.menu-btn{display:inline-flex!important}}
  .menu-btn{display:none}
  @media print{
    @page{ size:A4 portrait; margin:8mm 12mm; }
    html,body{ background:#fff !important; }
    .app,.modal-bg,.toast,.login-bg{ display:none !important; }
    #printRoot{ display:block !important; position:static !important; padding:0 !important; z-index:auto !important; }
    #printRoot table{ page-break-inside:auto; width:100% !important; display:table !important; }
    #printRoot tr{ page-break-inside:avoid; }
    #printRoot thead{ display:table-header-group; }
    #printRoot td, #printRoot th{ padding:4px 8px !important; }
    #printRoot h3{ margin:9px 0 5px !important; page-break-after:avoid; }
    #printRoot .qh{ margin-bottom:8px !important; padding-bottom:8px !important; }
    /* breakup & work order: keep each window whole and one per page */
    .mode-detail .pw, .mode-prod .pw{ page-break-inside:avoid; break-inside:avoid; }
    .mode-detail .pw ~ .pw, .mode-prod .pw ~ .pw{ page-break-before:always; }
  }
  #printRoot{display:none;background:#fff;color:#111}
  body.printing #printRoot{display:block;position:fixed;inset:0;z-index:9999;overflow:auto;padding:26px}
  #printRoot .qh{display:flex;justify-content:space-between;border-bottom:3px solid #1f6feb;padding-bottom:12px;margin-bottom:14px}
  #printRoot table{font-size:12px}#printRoot th{color:#333;border-bottom:2px solid #333}#printRoot td{border-bottom:1px solid #ccc}
  #printRoot h3{margin:18px 0 6px}
  .login-bg{position:fixed;inset:0;background:linear-gradient(135deg,#0d2b57,#0b1622);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
  .login-bg.show{display:flex}
  .login-box{background:var(--panel);color:var(--text);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.4);width:100%;max-width:380px;padding:28px}
  .login-box .logo{border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
  body.locked .app{filter:blur(3px);pointer-events:none}
</style>
</head>

<div class="app no-print">
  <aside class="side" id="side">
    <div class="brand"><div class="logo">PSG</div>
      <div><b>Pakistan Safety Glass</b><br><small>Window Quotation System</small></div></div>
    <div id="navItems"></div>
    <div class="spacer"></div>
    <div id="meBox"></div>
    <div class="nav" id="cloudBtn"><span class="cloud-dot" id="cloudDot"></span> Cloud (Supabase)</div>

    <div class="nav" id="importBtn"><span class="ic">⭱</span> Import</div>

  </aside>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="ghost sm menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>

      </div>
      <button class="ghost sm" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="login-bg" id="loginBg"><div class="login-box" id="loginBox"></div></div>
<div class="toast" id="toast"></div>
<div id="printRoot"></div>

  let list=(t[thermal]||[]).slice();
  // only keep series we actually have a profile system for OR keep name (some have no rates)
  return list;
}
function brandsFor(series){ return IL.handleBrands[series]||[]; }
function modelsFor(brand,lockType){ return IL.handleModels[(brand||'')+'|'+(lockType||'')]||[]; }
function hingesFor(series){ return IL.hinges[series]||[]; }
function widthsFor(series){ return SEED.widths[rateSeries(series)]||[]; }
function hasRates(series){ return !!SEED.systemsHaveRates[rateSeries(series)]; }
function glassChoices(glazing){ const cats=(glazing==='Single')?SEED.singleCats:SEED.glassCats;
  return [...new Set((DB.rates.glass||[]).filter(g=>cats.includes(g.cat)).map(g=>g.name))]; }
function glassRate(name,thk){ const gs=(DB.rates.glass||[]).filter(x=>x.name===name);
  const exact=gs.find(x=>x.thickness===thk); if(exact) return num(exact.rate);
  const any=gs.find(x=>!x.thickness); return any?num(any.rate):(gs[0]?num(gs[0].rate):0); }
function spacerChoices(){ return (DB.rates.spacers||[]).map(s=>s.size); }
function spacerRate(size){ const s=(DB.rates.spacers||[]).find(x=>x.size===size); return s?num(s.rate):0; }
function mmOf(s){ const m=/([\d.]+)/.exec(String(s||'')); return m?parseFloat(m[1]):0; }
function unitThk(w){ return Math.round(mmOf(w.glassOuterThk)+mmOf(w.spacer)+mmOf(w.glassInnerThk)); }

/* ---- per-design dimension & section engine (mirrors each workbook design sheet) ---- */
function getDesign(w){ return (w.code&&SEED.designs[w.code])||SEED.defaultDesign; }
function dimVal(w,n){ return num((w.dim||{})[n]); }
function evalExpr(expr,g,series){ if(!expr) return 0;
  try{ return Function('g','IF','OR','C4','return ('+expr+')')(g,(c,a,b)=>c?a:b,(...a)=>a.some(Boolean),series)||0; }catch(e){ return 0; } }
function resolveG(w,series){ const des=getDesign(w), g=[];
  des.inputs.forEach(i=>{ g[i.n]=dimVal(w,i.n); });
  des.derived.forEach(d=>{ g[d.n]=evalExpr(d.expr,g,series); });
  return {des,g}; }
function designSections(w,series){ const {des,g}=resolveG(w,series);
  // Fallback: fixed windows whose design sheet doesn't declare Outside get the frame perimeter.
  const outer = des.outer ? evalExpr(des.outer,g,series) : ((w.wtype||'casement')==='fixed'?2*(num(g[4])+num(g[5])):0);
  return {g,des,outer,divider:evalExpr(des.divider,g,series),
    bidding:evalExpr(des.bidding,g,series),netting:evalExpr(des.netting,g,series),shutter:evalExpr(des.shutter,g,series)}; }
function dimsOf(w){ const {g}=resolveG(w,w.series); return {g,OH:num(g[4]),OW:num(g[5]),SH:num(g[6])||num(g[4]),SW:num(g[7])||num(g[5])}; }
/* linear-coefficient decomposition of a section formula → cut pieces [{len(ft),cnt}] */
function sectionPieces(expr,g,series){ if(!expr) return []; const base=evalExpr(expr,g,series), out=[];
  for(let n=4;n<=11;n++){ if(g[n]===undefined) continue; const g2=g.slice(); g2[n]=(g[n]||0)+1;
    const c=Math.round(evalExpr(expr,g2,series)-base); if(c>0 && g[n]>0) out.push({len:g[n],cnt:c}); } return out; }
function deductMM(series){ return num(IL.cutDeductMM[series]||0); }

/* ============================ PRICING ENGINE ============================ */
const SERIES_ALIAS={URBAN_PLUS:'URBAN'};        // shares URBAN profiles
const STOCK_FT=[12,14,16,18];                   // non-thermal candidate stock lengths (max 18ft)
const THERMAL_SERIES=new Set(['URBAN','URBAN_PLUS','URBAN_COMFORT','EUROTHERM']);
function stockOptions(series){ return THERMAL_SERIES.has(series)?[18]:STOCK_FT; }
function rateSeries(s){ return SERIES_ALIAS[s]||s; }
function accRate(name){ const a=DB.rates.accessories[name]; return a?num(a.rate):0; }
function sysParts(series){ return DB.rates.systems[rateSeries(series)]||[]; }
function hasSection(series,sec){ return sysParts(series).some(p=>p.section===sec); }
function partsFor(series,section,widthPref){
  let parts=sysParts(series).filter(p=>p.section===section);
  if(!parts.length) return [];
  if(widthPref){ const m=parts.filter(p=>String(p.width)===String(widthPref)); if(m.length) return m; }
  return parts;
}
function pickPart(series,section,widthPref,pickedName){
  const parts=partsFor(series,section,widthPref);
  if(!parts.length) return null;
  if(pickedName){ const m=parts.find(p=>p.part===pickedName); if(m) return m; }
  return parts[0];
}
function partRate(part,finish){ if(!part) return 0; const r=part.rates||{};
  return num(r[finish] ?? r['Natural'] ?? Object.values(r)[0] ?? 0); }
function isUrban(s){ return s==='URBAN'||s==='URBAN_PLUS'; }

function calcWindow(w){
  const wtype=w.wtype||'casement';
  const finish=w.finish||'Natural', series=w.series;
  const {g}=resolveG(w,series);
  const OH=num(g[4]), OW=num(g[5]), SH=num(g[6])||OH, SW=num(g[7])||OW;
  const area=OH*OW, per_open=2*(OH+OW), per_shut=2*(SH+SW);
  const sec=[]; let dsSec={outer:0,divider:0,bidding:0,netting:0,shutter:0};
  const picks=w.picks||{};
  const addSec=(label,section,length,widthPref)=>{
    if(!hasSection(series,section)||length<=0) return;
    const wp=widthPref||w.width;
    const options=partsFor(series,section,wp).map(p=>p.part);
    const part=pickPart(series,section,wp,picks[section]), rate=partRate(part,finish);
    sec.push({label,section,options,part:part?part.part:'—',width:part?part.width:'',length:+length.toFixed(2),unit:'rft',rate,amount:length*rate});
  };

  if(wtype==='sliding'){
    const nSh=num(w.nShutters)||2;
    if(hasSection(series,'Outer')) addSec('Outer Section','Outer',per_open);
    ['Outer Bottom','Outer Top'].forEach(s=>{ if(hasSection(series,s)) addSec(s+' Section',s,OW); });
    if(hasSection(series,'Outer Height')) addSec('Outer Height Section','Outer Height',2*OH);
    ['Shutter Bottom','Shutter Top'].forEach(s=>{ if(hasSection(series,s)) addSec(s+' Section',s,SW*nSh); });
    if(hasSection(series,'Shutter Height')) addSec('Shutter Height Section','Shutter Height',2*SH*nSh);
    if(hasSection(series,'Interlock')) addSec('Interlock Section','Interlock',SH*nSh);
    if(hasSection(series,'Bidding')) addSec('Bidding Section','Bidding',per_open);
    if(w.netting && hasSection(series,'Net')) addSec('Netting Section','Net',per_open);
  } else {
    // per-design formulas from the workbook design sheet
    const ds=designSections(w,series); dsSec=ds;
    addSec('Outside Section','Outer',ds.outer);
    addSec('Divider Section','Divider',ds.divider);
    addSec('Bidding Section','Bidding',ds.bidding);
    addSec('Netting Section','Net',ds.netting);
    addSec('Shutter Section','Shutter',ds.shutter);
  }
  const aluminium=sec.reduce((s,x)=>s+x.amount,0);

  // ---- hardware & accessories ----  (qty carries a unit: pc / rft / Sft)
  const hw=[];
  const addHw=(label,qty,rate,unit,note)=>{ const amt=qty*rate; if(amt||qty) hw.push({label,qty:+qty,rate,unit:unit||'pc',amount:amt,note:note||''}); };
  const bidLen = wtype==='sliding'?(isUrban(series)?0:per_open):dsSec.bidding;
  const shutLen = wtype==='sliding'?per_shut:dsSec.shutter;
  if(wtype!=='fixed'){
    const hr=w.handle?num(DB.rates.handles[w.handle]||0):0;
    const hq=(w.handleQty===0||w.handleQty==='0')?0:(num(w.handleQty)||1);
    if(w.handle) addHw('Handle + Accessories',hq,hr,'pc',w.handle);
    let rubberLen = isUrban(series)?shutLen : (series==='ECONOMY'?(bidLen+shutLen)*2:(bidLen*2)+shutLen);
    addHw('Glass Rubber',rubberLen,accRate('Glass Rubber'),'rft');
    addHw('Angle',3,accRate('Angle'),'rft');
    if(num(w.brush)>0) addHw('Brush',num(w.brush),accRate('Brush'),'rft');
    if(w.hinge==='J3'||w.hinge==='J4') addHw('Peg Stay (FC-310)',1,accRate('FC-310'),'pc');
    if(wtype==='casement' && w.hinge){
      let hq2 = w.hinge==='HC-320'?2:(OH<=5?3:(OH<=8?4:5));
      addHw('Hinges ('+w.hinge+')',hq2,num(DB.rates.hinges[w.hinge]||accRate(w.hinge)),'pc');
    }
    if(w.netting) addHw('Net ('+w.netting+')',SH*SW,accRate(w.netting),'Sft');
  }
  addHw('Labor',area,accRate('Labor'),'Sft');
  addHw('Silicon',1,accRate('Silicon'),'pc');
  if(wtype!=='fixed') addHw('Window Hardware',area,accRate('Window hardware'),'Sft');
  // glass panes + spacer (priced from glass rate table, by type + thickness)
  const dblG=w.glazing==='Double', hasGlass=dblG?(w.glassOuterThk||w.glassInnerThk):w.glassThk;
  if(hasGlass){ const gA=glassOf(w);
    if(dblG){ const perPane=gA.areaSft/2;
      addHw('Glass — '+(w.glassOuter||'Clear')+' '+(w.glassOuterThk||'')+' (outer)',perPane,glassRate(w.glassOuter,w.glassOuterThk),'Sft');
      addHw('Glass — '+(w.glassInner||'Clear')+' '+(w.glassInnerThk||'')+' (inner)',perPane,glassRate(w.glassInner,w.glassInnerThk),'Sft');
      if(gA.spacerRft) addHw('Spacer — '+(w.spacer||''),gA.spacerRft,spacerRate(w.spacer),'rft');
    } else addHw('Glass — '+(w.glassOuter||'Clear')+' '+(w.glassThk||''),gA.areaSft,glassRate(w.glassOuter,w.glassThk),'Sft');
  }
  const hardware=hw.reduce((s,x)=>s+x.amount,0);

  const subtotal=aluminium+hardware, profitPct=num(w.profit);
  const withProfit=subtotal*(1+profitPct/100), qty=num(w.qty)||1;
  return {wtype,OH,OW,SH,SW,area,sec,hw,aluminium,hardware,subtotal,profitPct,withProfit,qty,
    lineTotal:withProfit*qty, perSqft:area?withProfit/area:0};
}
function quoteTotal(q){ return (q.windows||[]).reduce((s,w)=>s+calcWindow(w).lineTotal,0); }

/* ============================ PRODUCTION / WASTAGE ENGINE ============================
 Cut list (mm) per section, then FIRST-FIT-DECREASING bin-packing across candidate stock
 lengths (STOCK_FT) — the app picks the bar length that MINIMISES wastage per section. */
function packBars(lengths,barMm){
  const arr=lengths.slice().sort((a,b)=>b-a), rem=[];
  for(const p of arr){ let placed=false; for(let i=0;i<rem.length;i++){ if(rem[i]>=p-1e-6){rem[i]-=p;placed=true;break;} } if(!placed) rem.push(barMm-p); }
  return rem.length;
}
function bestBar(pieces,series){
  const stock=stockOptions(series);
  const lengths=[]; pieces.forEach(p=>{ for(let i=0;i<p.cnt;i++) lengths.push(p.len); });
  const total=lengths.reduce((a,b)=>a+b,0); if(!total) return {ft:0,barMm:0,bars:0,waste:0,total:0};
  const maxPiece=Math.max(...lengths); let best=null;
  stock.forEach(ft=>{ const barMm=ft*FT_MM; if(maxPiece>barMm) return;
    const bars=packBars(lengths,barMm), waste=(bars*barMm-total)/(bars*barMm);
    if(!best||waste<best.waste-1e-9||(Math.abs(waste-best.waste)<1e-9&&bars<best.bars)) best={ft,barMm,bars,waste}; });
  if(!best){ const ft=stock[stock.length-1],barMm=ft*FT_MM,bars=Math.ceil(total/barMm); best={ft,barMm,bars,waste:(bars*barMm-total)/(bars*barMm)}; }
  return {...best,total};
}
function prodGroups(w){
  const qty=num(w.qty)||1, ded=deductMM(w.series), rup=x=>Math.ceil(x), groups=[], series=w.series;
  const g=(name,part,pieces)=>{ const pf=pieces.filter(p=>p.len>0&&p.cnt>0); if(pf.length) groups.push({name,part,pieces:pf}); };
  const partOf=(sec)=>{ const p=pickPart(series,sec,w.width); return p?p.part+(p.width?(' '+p.width):''):''; };
  if((w.wtype||'casement')==='sliding'){
    const d=dimsOf(w),OH=d.OH,OW=d.OW,SH=d.SH,SW=d.SW,nSh=num(w.nShutters)||2;
    const cut=(len,cnt)=>({len:rup(len*FT_MM)-ded,cnt:cnt*qty});
    if(hasSection(series,'Outer')) g('Outer',partOf('Outer'),[cut(OH,2),cut(OW,2)]);
    if(hasSection(series,'Outer Bottom')) g('Outer Bottom',partOf('Outer Bottom'),[cut(OW,1)]);
    if(hasSection(series,'Outer Top')) g('Outer Top',partOf('Outer Top'),[cut(OW,1)]);
    if(hasSection(series,'Outer Height')) g('Outer Height',partOf('Outer Height'),[cut(OH,2)]);
    if(hasSection(series,'Shutter Bottom')) g('Shutter Bottom',partOf('Shutter Bottom'),[cut(SW,nSh)]);
    if(hasSection(series,'Shutter Top')) g('Shutter Top',partOf('Shutter Top'),[cut(SW,nSh)]);
    if(hasSection(series,'Shutter Height')) g('Shutter Height',partOf('Shutter Height'),[cut(SH,2*nSh)]);
    if(hasSection(series,'Interlock')) g('Interlock',partOf('Interlock'),[{len:rup(SH*FT_MM),cnt:nSh*qty}]);
    if(hasSection(series,'Bidding')) g('Bidding',partOf('Bidding'),[cut(OH,2),cut(OW,2)]);
    if(w.netting && hasSection(series,'Net')) g('Netting',partOf('Net'),[cut(OH,2),cut(OW,2)]);
  } else {
    const {g:gv,des}=resolveG(w,series);
    [['Outer',des.outer],['Divider',des.divider],['Bidding',des.bidding],['Net',des.netting],['Shutter',des.shutter]].forEach(([sec,expr])=>{
      if(!expr || !hasSection(series,sec)) return;
      const merged={}; sectionPieces(expr,gv,series).forEach(p=>{ const L=rup(p.len*FT_MM)-ded, c=p.cnt*qty; if(L>0&&c>0) merged[L]=(merged[L]||0)+c; });
      g(sec==='Net'?'Netting':sec, partOf(sec), Object.entries(merged).map(([L,c])=>({len:+L,cnt:c})));
    });
  }
  return groups;
}
function calcProduction(w){
  const groups=prodGroups(w); let totalBars=0,usedMm=0,wasteMm=0;
  const rows=groups.map(gr=>{ const bb=bestBar(gr.pieces,w.series); const wm=Math.round(bb.bars*bb.barMm-bb.total);
    totalBars+=bb.bars; usedMm+=bb.total; wasteMm+=wm;
    return {name:gr.name,part:gr.part,pieces:gr.pieces,totalMm:Math.round(bb.total),barFt:bb.ft,bars:bb.bars,wastagePct:bb.waste*100,wasteMm:wm}; });
  return {rows,totalBars,usedMm:Math.round(usedMm),totalWastageMm:wasteMm,wastagePct:(usedMm+wasteMm)>0?wasteMm/(usedMm+wasteMm)*100:0};
}
function glassLabel(w){
  if(w.glazing==='Double'){ const u=unitThk(w); if(!(w.glassOuterThk||w.glassInnerThk)) return '—';
    return `${u?u+'mm ':''}DGU · ${w.glassOuter||'Clear'} ${w.glassOuterThk||''} + ${w.glassInner||'Clear'} ${w.glassInnerThk||''}`.replace(/\s+/g,' ').trim(); }
  const t=w.glassThk||''; return t?`${t} Tempered ${w.glassOuter||'Clear'}`:'—'; }
function glassOf(w){ const _d=dimsOf(w),SH=_d.SH,SW=_d.SW,qty=num(w.qty)||1;
  const units=((w.wtype==='sliding')?(num(w.nShutters)||2):1)*qty;   // glazed openings
  const dbl=w.glazing==='Double', panesPer=dbl?2:1;
  return {label:glassLabel(w),glazing:w.glazing||'Single',unitThk:dbl?unitThk(w):null,
    outer:w.glassOuter||'Clear',outerThk:dbl?(w.glassOuterThk||''):(w.glassThk||''),
    inner:dbl?(w.glassInner||'Clear'):null,innerThk:dbl?(w.glassInnerThk||''):null,spacer:w.spacer||'',
    paneW:SW,paneH:SH,units,panes:units*panesPer,areaSft:+(SW*SH*panesPer*units).toFixed(2),
    spacerRft:dbl?+(2*(SW+SH)*units).toFixed(2):0}; }
/* hardware BOM lines for production (materials, with units) */
function bomOf(w){ return calcWindow(w).hw.filter(h=>h.label!=='Labor' && !/^Glass — |^Spacer — /.test(h.label)).map(h=>({item:h.label,qty:+(Math.round(h.qty*100)/100),unit:h.unit})); }

/* PROJECT-WIDE BOM: pool every window's cut pieces per profile, re-optimise the bar
   length across the whole quote, then merge hardware and glass. */
function calcBOM(q){
  const alu={};
  (q.windows||[]).forEach(w=>{ prodGroups(w).forEach(gr=>{
    const key=w.series+'|'+gr.part;
    if(!alu[key]) alu[key]={series:w.series,profile:gr.part,pieces:[]};
    gr.pieces.forEach(p=>alu[key].pieces.push({len:p.len,cnt:p.cnt}));
  }); });
  const aluRows=Object.values(alu).map(g=>{ const bb=bestBar(g.pieces,g.series);
    return {series:g.series,profile:g.profile,bars:bb.bars,barFt:bb.ft,wastagePct:bb.waste*100,usedMm:Math.round(bb.total)}; })
    .sort((a,b)=>(a.series+a.profile).localeCompare(b.series+b.profile));
  const hw={};
  (q.windows||[]).forEach(w=>bomOf(w).forEach(b=>{ const k=b.item+'|'+b.unit; hw[k]=(hw[k]||0)+b.qty; }));
  const hwRows=Object.entries(hw).map(([k,v])=>{ const [item,unit]=k.split('|'); return {item,unit,qty:Math.round(v*100)/100}; });
  const glMap={};
  (q.windows||[]).forEach(w=>{ const g=glassOf(w);
    const key=g.label+'|'+g.paneW+'|'+g.paneH;
    if(!glMap[key]) glMap[key]={...g,totalUnits:0,totalSpacer:0};
    glMap[key].totalUnits+=g.units;
    glMap[key].totalSpacer=+(glMap[key].totalSpacer+(g.spacerRft||0)).toFixed(2);
  });
  const glassRows=Object.values(glMap);
  return {aluRows,hwRows,glassRows,totalBars:aluRows.reduce((s,r)=>s+r.bars,0)};
}

function newQuote(){ const q={id:uid(),quoteNo:'PSG-Q'+String(DB.seq).padStart(4,'0'),customer:'',ref:'',sales:'',
  date:new Date().toISOString().slice(0,10),deliver:'',windows:[]}; DB.seq++; DB.quotes.push(q); save(); cloudSaveQuote(q); CURR=q.id; SUB='design'; go('editor'); }

function renderEditor(){

function toggleWin(id){ const w=curr().windows.find(x=>x.id===id); w._open=!w._open; document.getElementById('wr_'+id).classList.toggle('open',w._open); }
function pickPartFor(id,section,partName){
  const q=curr(), w=q.windows.find(x=>x.id===id);
  w.picks=w.picks||{}; w.picks[section]=partName; save(); cloudSaveQuote(q);
  const r=calcWindow(w), wr=document.getElementById('wr_'+id);
  const hdr=wr.querySelector('.wh .right'); if(hdr) hdr.innerHTML=`<div style="font-weight:800">${money(r.lineTotal)}</div><div class="muted" style="font-size:11px">${money(r.perSqft)}/sqft</div>`;
  const bd=wr.querySelector('.bd-wrap'); if(bd) bd.innerHTML=breakdownHTML(r,id);
}
function addWindow(code){
  const q=curr(), cat=code?DB.rates.catalogue.find(c=>c.code===code):null;
  const category=cat?cat.category:'Casement', wt=typeFor(category);
  const series=(seriesFor(wt,'NO')[1]||seriesFor(wt,'NO')[0]||'');
  const des=(code&&SEED.designs[code])||SEED.defaultDesign; const dim={}; des.inputs.forEach(i=>dim[i.n]=i.def);
  const w={id:uid(),code:code||'',name:cat?cat.category+' window':'',category,wtype:wt,thermal:'NO',
    series,width:widthsFor(series)[0]||'',finish:'Natural',dim,nShutters:2,qty:1,
    lockType:(IL.lockTypes[wt]||[])[0]||'',handleBrand:'',handle:'',handleQty:cat&&cat.handleQty!=null?cat.handleQty:1,
    hinge:'',netting:'',glazing:'Single',glassThk:'',glassOuter:'Clear',glassInner:'Clear',glassOuterThk:'',glassInnerThk:'',spacer:(SEED.spacers[0]||{}).size||'',dividers:0,brush:0,profit:20,_open:true};
  q.windows.push(w); save(); cloudSaveQuote(q); renderWindows();
}
function delWindow(id){ const q=curr(); q.windows=q.windows.filter(w=>w.id!==id); save(); cloudSaveQuote(q); renderWindows(); }
function upd(id,el){
  const q=curr(), w=q.windows.find(x=>x.id===id), k=el.dataset.k;
  if(k.startsWith('dim_')){ const n=+k.slice(4); w.dim=w.dim||{}; w.dim[n]=el.value===''?'':num(el.value)/304.8; }
  else w[k]= el.type==='number'?(el.value===''?'':num(el.value)):el.value;
  // cascade resets
  if(k==='category'){ w.wtype=typeFor(w.value=el.value); if(w.wtype==='sliding')w.thermal='NO';
    const sl=seriesFor(w.wtype,w.thermal); if(!sl.includes(w.series)) w.series=sl[0]||''; w.lockType=(IL.lockTypes[w.wtype]||[])[0]||''; w.handleBrand='';w.handle='';w.hinge=''; }
  if(k==='thermal'){ const sl=seriesFor(w.wtype,w.thermal); if(!sl.includes(w.series)) w.series=sl[0]||''; w.handleBrand='';w.handle=''; w.hinge=''; }
  if(k==='series'){ w.width=widthsFor(w.series)[0]||''; w.picks={}; if(!brandsFor(w.series).includes(w.handleBrand)){w.handleBrand='';w.handle='';} if(!hingesFor(w.series).includes(w.hinge))w.hinge=''; }
  if(k==='width'){ w.picks={}; }
  if(k==='lockType'||k==='handleBrand'){ if(!modelsFor(w.handleBrand,w.lockType).includes(w.handle)) w.handle=''; }
  if(k==='glazing'){ w.glassThk=''; w.glassOuter='Clear'; w.glassInner='Clear'; w.glassOuterThk=''; w.glassInnerThk=''; if(!w.spacer)w.spacer=(DB.rates.spacers[0]||{}).size||''; }
  save(); cloudSaveQuote(q);
  const structural=['category','thermal','series','lockType','handleBrand','wtype','glazing','spacer','glassOuterThk','glassInnerThk'].includes(k);
  const r=calcWindow(w), wr=document.getElementById('wr_'+id);
  const hdr=wr.querySelector('.wh .right'); if(hdr) hdr.innerHTML=`<div style="font-weight:800">${money(r.lineTotal)}</div><div class="muted" style="font-size:11px">${money(r.perSqft)}/sqft</div>`;
  const sub=wr.querySelector('.wh .muted'); if(sub) sub.textContent=`${w.category||''} · ${w.series||'—'} · ${w.finish||''} · ${dimStr(w)} · Qty ${num(w.qty)||1}`;
  if(structural){ wr.querySelector('.wb').innerHTML=winFormHTML(w,r); }
  else { const bd=wr.querySelector('.bd-wrap'); if(bd) bd.innerHTML=breakdownHTML(r,id); }
}

    (q.windows||[]).forEach((w,i)=>{const p=calcProduction(w),bom=bomOf(w),g=glassOf(w);
      body+=`<div class="pw"><h3>${String(i+1).padStart(2,'0')} · ${esc(w.name||w.code||'Window')} — ${esc(w.series||'')} ${esc(w.finish||'')} · ${dimStr(w)} · Qty ${num(w.qty)||1}</h3>
       <table style="margin-bottom:8px"><thead><tr><th>Section</th><th>Profile</th><th>Cut pieces (mm × qty)</th><th style="text-align:center">Bar</th><th style="text-align:center">Bars</th><th style="text-align:right">Wastage</th></tr></thead>
        <tbody>${p.rows.map(rw=>`<tr><td>${rw.name}</td><td>${esc(rw.part)}</td><td>${rw.pieces.map(pc=>pc.len+'×'+pc.cnt).join(', ')}</td><td style="text-align:center">${rw.barFt}ft</td><td style="text-align:center">${rw.bars}</td><td style="text-align:right">${rw.wastagePct.toFixed(1)}%</td></tr>`).join('')}
         <tr><td colspan=4 style="text-align:right"><b>Total</b></td><td style="text-align:center"><b>${p.totalBars} bars</b></td><td style="text-align:right"><b>${p.wastagePct.toFixed(1)}%</b></td></tr></tbody></table>
       <table style="margin-bottom:16px"><thead><tr><th>Hardware / accessory</th><th style="text-align:right">Qty</th></tr></thead>
        <tbody>${bom.map(b=>`<tr><td>${esc(b.item)}</td><td style="text-align:right">${b.qty} ${b.unit}</td></tr>`).join('')}
         <tr><td><b>Glass — ${esc(g.label)} (${g.paneW}×${g.paneH}ft)</b></td><td style="text-align:right"><b>${g.panes} pane${g.panes!=1?'s':''} · ${g.areaSft} Sft</b></td></tr>
         ${g.spacerRft?`<tr><td>Spacer bar</td><td style="text-align:right">${g.spacerRft} rft</td></tr>`:''}</tbody></table></div>`;});
  }
  const pr=document.getElementById('printRoot'); pr.className='mode-'+mode;
  pr.innerHTML=head+body+`<div style="margin-top:20px;font-size:10px;color:#666">Generated by Pakistan Safety Glass Quotation System · ${new Date().toLocaleDateString()}</div>`;
  document.body.classList.add('printing'); window.print();
  setTimeout(()=>document.body.classList.remove('printing'),400);
}
window.addEventListener('afterprint',()=>document.body.classList.remove('printing'));

/* ============================ SUPABASE CLOUD ============================ */
let SB=null, cloudCfg=JSON.parse(localStorage.getItem(LS_CLOUD)||'null') || ((CLOUD_DEFAULT.url&&CLOUD_DEFAULT.key)?{url:CLOUD_DEFAULT.url,key:CLOUD_DEFAULT.key}:null);
function cloudInit(){
  if(cloudCfg&&cloudCfg.url&&cloudCfg.key&&window.supabase){
    try{ SB=window.supabase.createClient(cloudCfg.url,cloudCfg.key); setCloudDot('on'); return true;}catch(e){ setCloudDot('err'); }
  } else setCloudDot('');
  return false;
}
function setCloudDot(s){ const d=document.getElementById('cloudDot'); if(d)d.className='cloud-dot'+(s?' '+s:''); }
function winToDB(w,qid,pos){ const {_open,...clean}=w; const d=dimsOf(w);
  return {id:w.id,quote_id:qid,position:pos,name:w.name||'',code:w.code||'',series:w.series||'',
    open_h:d.OH,open_w:d.OW,qty:num(w.qty)||1,data:clean}; }
function winFromDB(r){ return r.data?{...r.data,id:r.id}:{id:r.id,name:r.name,code:r.code,series:r.series,qty:r.qty}; }
async function cloudSaveQuote(q){ if(!SB)return;
  try{ await SB.from('psg_quotes').upsert({id:q.id,quote_no:q.quoteNo,customer:q.customer,ref:q.ref,sales:q.sales,quote_date:q.date,deliver:q.deliver});
    await SB.from('psg_windows').delete().eq('quote_id',q.id);
    if((q.windows||[]).length) await SB.from('psg_windows').insert(q.windows.map((w,i)=>winToDB(w,q.id,i)));
    setCloudDot('on'); }catch(e){ setCloudDot('err'); console.warn('cloud save',e); } }
async function cloudDeleteQuote(id){ if(!SB)return; try{ await SB.from('psg_windows').delete().eq('quote_id',id); await SB.from('psg_quotes').delete().eq('id',id);}catch(e){console.warn(e);} }
async function cloudPull(){ if(!SB){toast('Connect Supabase first');return;}
  try{ const {data:qs,error:e1}=await SB.from('psg_quotes').select('*'); if(e1)throw e1;
    const {data:wsr,error:e2}=await SB.from('psg_windows').select('*'); if(e2)throw e2;
    const byq={}; (wsr||[]).forEach(r=>{(byq[r.quote_id]=byq[r.quote_id]||[]).push(r);});
    DB.quotes=(qs||[]).map(q=>({id:q.id,quoteNo:q.quote_no,customer:q.customer,ref:q.ref,sales:q.sales,date:q.quote_date,deliver:q.deliver,
      windows:(byq[q.id]||[]).sort((a,b)=>a.position-b.position).map(winFromDB)}));
    let mx=1; DB.quotes.forEach(q=>{const m=/(\d+)$/.exec(q.quoteNo||'');if(m)mx=Math.max(mx,+m[1]+1);}); DB.seq=mx;
    save(); setCloudDot('on'); toast('Pulled '+DB.quotes.length+' quotes from cloud'); go('quotes'); }catch(e){ setCloudDot('err'); toast('Cloud pull failed — check keys/schema'); console.warn(e); } }
async function cloudPushAll(){ if(!SB){toast('Connect Supabase first');return;} for(const q of DB.quotes){ await cloudSaveQuote(q);} await cloudSaveUsers(); await cloudSaveDevices(); toast('Pushed '+DB.quotes.length+' quotes + users/devices to cloud'); }
async function cloudSaveUsers(){ if(!SB)return; try{ await SB.from('psg_users').upsert(DB.users.map(u=>({username:u.username,password:u.password,role:u.role,views:u.views||[]})));}catch(e){console.warn('users',e);} }
async function cloudSaveDevices(){ if(!SB)return; try{ await SB.from('psg_devices').delete().neq('id','__none__'); if((DB.devices||[]).length) await SB.from('psg_devices').insert(DB.devices.map(d=>({id:d.id,label:d.label||'',app_user:d.user||'',device_mode:DB.security.deviceMode})));
    await SB.from('psg_settings').upsert({key:'deviceMode',value:DB.security.deviceMode}); }catch(e){console.warn('devices',e);} }
async function cloudPullAuth(){ if(!SB)return;
  try{ const {data:us}=await SB.from('psg_users').select('*'); if(us&&us.length) DB.users=us.map(u=>({username:u.username,password:u.password,role:u.role,views:u.views||['dashboard'],devices:[]}));
    const {data:ds}=await SB.from('psg_devices').select('*'); if(ds) DB.devices=ds.map(d=>({id:d.id,label:d.label,user:d.app_user,approvedAt:''}));
    const {data:st}=await SB.from('psg_settings').select('*').eq('key','deviceMode').maybeSingle(); if(st&&st.value)DB.security.deviceMode=st.value;
    save(); }catch(e){console.warn('pull auth',e);} }
function openCloud(){
  const c=cloudCfg||{url:'',key:''};
  showModal(`<div class="hd"><h3>Cloud storage — Supabase</h3><button class="ghost sm" onclick="closeModal()">✕</button></div>
   <div class="bd"><p class="muted" style="margin-top:0">Paste your Supabase <b>Project URL</b> and <b>anon public</b> key. Run the schema &amp; data SQL I gave you first. No login — the anon key gives shared access (fine for an internal team tool).</p>
     <div class="field"><label>Project URL</label><input id="sb_url" value="${esc(c.url||'')}" placeholder="https://xxxx.supabase.co"></div>
     <div class="field"><label>Anon public key</label><input id="sb_key" value="${esc(c.key||'')}" placeholder="eyJ..."></div>
     <div class="row" style="align-items:center"><span class="cloud-dot ${SB?'on':''}"></span><span class="muted">${SB?'Connected':'Not connected'}</span></div>
   </div>
   <div class="ft"><button class="ghost" onclick="cloudPull()">⭳ Pull from cloud</button><button class="ghost" onclick="cloudPushAll()">⭱ Push all to cloud</button>
     <button onclick="saveCloudCfg()">Save &amp; connect</button></div>`);
}
function saveCloudCfg(){ cloudCfg={url:val('sb_url').trim(),key:val('sb_key').trim()}; localStorage.setItem(LS_CLOUD,JSON.stringify(cloudCfg));
  if(cloudInit()){ toast('Connected to Supabase'); closeModal(); } else toast('Could not connect — check the URL/key'); }

/* ============================ AUTH / LOGIN ============================ */
function renderLogin(){
  const id=deviceId();
  document.body.classList.add('locked');
  document.getElementById('loginBg').classList.add('show');
  document.getElementById('loginBox').innerHTML=`
    <div style="text-align:center;margin-bottom:18px"><div class="logo" style="width:52px;height:52px;font-size:20px;margin:0 auto 10px">PSG</div>
      <h2 style="margin:0">Pakistan Safety Glass</h2><div class="muted">Window Quotation System — sign in</div></div>
    <div class="field"><label>User name</label><input id="li_user" autofocus placeholder="e.g. Munis" onkeydown="if(event.key==='Enter')document.getElementById('li_pass').focus()"></div>
    <div class="field"><label>Password</label><input id="li_pass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="li_err" style="color:var(--danger);font-size:13px;min-height:18px;margin-bottom:6px"></div>
    <button style="width:100%" onclick="doLogin()">Sign in</button>
    <div class="muted" style="font-size:11px;margin-top:14px;text-align:center">This device: <b>${id}</b></div>`;
}
function doLogin(){
  const u=val('li_user').trim(), p=val('li_pass');
  const user=findUser(u); const err=document.getElementById('li_err');
  if(!user||user.password!==p){ err.textContent='Wrong user name or password.'; return; }
  if(!deviceApproved(user)){
    // auto-approve first-ever device by an admin; otherwise block
    if(user.role==='admin' && !(DB.devices||[]).length){ DB.devices.push({id:deviceId(),label:'Admin device',user:'',approvedAt:new Date().toISOString()}); save(); }
    else if(!deviceApproved(user)){ err.innerHTML='This device is not approved. Ask an admin to approve Device ID <b>'+deviceId()+'</b>.';
      DB._pending=DB._pending||[]; if(!DB._pending.includes(deviceId()))DB._pending.push(deviceId()); save(); return; }
  }
  ME=user; localStorage.setItem('psg_session',JSON.stringify({u:user.username,at:Date.now()}));
  document.getElementById('loginBg').classList.remove('show'); document.body.classList.remove('locked');
  buildNav(); go('dashboard');
}
function logout(){ ME=null; localStorage.removeItem('psg_session'); renderLogin(); }
function buildNav(){
  const items=[['dashboard','▚','Dashboard'],['quotes','▤','Quotations'],['catalogue','▦','Catalogue'],['rates','₨','Rates'],['admin','⚙','Admin Console']];
  const nav=document.getElementById('navItems');
  nav.innerHTML=items.filter(([v])=>v==='dashboard'||can(v)).map(([v,ic,label])=>`<div class="nav" data-view="${v}"><span class="ic">${ic}</span> ${label}</div>`).join('');
  nav.querySelectorAll('.nav[data-view]').forEach(n=>n.addEventListener('click',()=>go(n.dataset.view)));
  document.getElementById('meBox').innerHTML=`<div class="muted" style="font-size:11px;padding:0 8px">Signed in as</div>
    <div style="padding:2px 8px 8px;display:flex;align-items:center;justify-content:space-between"><b>${esc(ME.username)}</b> <span class="badge">${ME.role}</span></div>`;
}

/* ============================ ADMIN CONSOLE ============================ */
function renderAdmin(){
  if(ME.role!=='admin'){ C().innerHTML='<div class="empty">Admins only.</div>'; return; }
  const views=SEED.allViews.filter(v=>v!=='dashboard');
  const dm=DB.security.deviceMode||'off';
  C().innerHTML=`
  <div class="card" style="margin-bottom:16px"><div class="hd"><b>Users & Permissions</b><button class="sm" onclick="addUser()">+ Add user</button></div>
   <div class="bd" style="padding:0;overflow:auto"><table><thead><tr><th>User</th><th>Password</th><th>Role</th>
     ${views.map(v=>`<th class="center">${v}</th>`).join('')}<th></th></tr></thead><tbody>
     ${DB.users.map((u,i)=>`<tr>
       <td><input style="max-width:120px" value="${esc(u.username)}" onchange="setUser(${i},'username',this.value)"></td>
       <td><input style="max-width:120px" value="${esc(u.password)}" onchange="setUser(${i},'password',this.value)"></td>
       <td><select style="max-width:100px" onchange="setUser(${i},'role',this.value)"><option ${u.role==='user'?'selected':''}>user</option><option ${u.role==='admin'?'selected':''}>admin</option></select></td>
       ${views.map(v=>`<td class="center"><input type="checkbox" style="width:auto" ${(u.role==='admin'||(u.views||[]).includes(v))?'checked':''} ${u.role==='admin'?'disabled':''} onchange="toggleView(${i},'${v}',this.checked)"></td>`).join('')}
       <td class="right"><button class="ghost sm danger" onclick="delUser(${i})">✕</button></td></tr>`).join('')}
     </tbody></table></div>
   <div class="bd muted" style="font-size:12px">Admins always have every permission. Changes save immediately${SB?' and sync to Supabase':''}.</div></div>

  <div class="card"><div class="hd"><b>Device Access Restriction</b>
     <div class="seg"><button class="${dm==='off'?'on':''}" onclick="setDeviceMode('off')">Off (any device)</button><button class="${dm==='global'?'on':''}" onclick="setDeviceMode('global')">On (approved devices only)</button></div></div>
   <div class="bd">
     <p class="muted" style="margin-top:0">Browsers can't read a hardware MAC address, so each machine is identified by a <b>Device ID</b> the app assigns. With restriction <b>On</b>, only approved Device IDs can sign in. This device: <b>${deviceId()}</b>
       ${(DB.devices||[]).some(d=>d.id===deviceId())?'<span class="chip g">approved</span>':`<button class="sm" onclick="approveDevice('${deviceId()}','This device')">Approve this device</button>`}</p>
     ${(DB._pending&&DB._pending.length)?`<div style="margin-bottom:12px"><b>Pending approval:</b> ${DB._pending.map(p=>`<span class="chip">${p} <a href="#" onclick="approveDevice('${p}','');return false">approve</a></span>`).join(' ')}</div>`:''}
     <table><thead><tr><th>Device ID</th><th>Label</th><th>Restricted to user</th><th></th></tr></thead><tbody>
       ${(DB.devices||[]).map((d,i)=>`<tr><td><b>${esc(d.id)}</b></td>
         <td><input style="max-width:160px" value="${esc(d.label||'')}" onchange="setDevice(${i},'label',this.value)"></td>
         <td><select style="max-width:140px" onchange="setDevice(${i},'user',this.value)"><option value="">Any user</option>${DB.users.map(u=>`<option ${d.user===u.username?'selected':''}>${esc(u.username)}</option>`).join('')}</select></td>
         <td class="right"><button class="ghost sm danger" onclick="delDevice(${i})">Revoke</button></td></tr>`).join('')||'<tr><td colspan=4 class="muted" style="padding:16px">No approved devices yet.</td></tr>'}
     </tbody></table></div></div>`;
}
function addUser(){ DB.users.push({username:'newuser',password:'changeme',role:'user',views:['dashboard'],devices:[]}); save(); cloudSaveUsers(); renderAdmin(); }
function setUser(i,k,v){ DB.users[i][k]=v; if(k==='role'&&v==='admin')DB.users[i].views=SEED.allViews.slice(); save(); cloudSaveUsers(); if(k==='role')renderAdmin(); }
function toggleView(i,v,on){ const u=DB.users[i]; u.views=u.views||[]; if(on){if(!u.views.includes(v))u.views.push(v);}else u.views=u.views.filter(x=>x!==v); save(); cloudSaveUsers(); }
function delUser(i){ if(DB.users[i].username===ME.username){toast("You can't delete yourself");return;} if(!confirm('Delete user?'))return; DB.users.splice(i,1); save(); cloudSaveUsers(); renderAdmin(); }
function setDeviceMode(m){ DB.security.deviceMode=m; if(m==='global'&&!(DB.devices||[]).some(d=>d.id===deviceId())){DB.devices.push({id:deviceId(),label:'This device',user:'',approvedAt:new Date().toISOString()});} save(); cloudSaveDevices(); renderAdmin(); }
function approveDevice(id,label){ if(!(DB.devices||[]).some(d=>d.id===id)) DB.devices.push({id,label:label||'',user:'',approvedAt:new Date().toISOString()}); DB._pending=(DB._pending||[]).filter(p=>p!==id); save(); cloudSaveDevices(); renderAdmin(); toast('Device approved'); }
function setDevice(i,k,v){ DB.devices[i][k]=v; save(); cloudSaveDevices(); }
function delDevice(i){ DB.devices.splice(i,1); save(); cloudSaveDevices(); renderAdmin(); }

/* ============================ HELPERS / BOOT ============================ */
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function jsq(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function val(id){const e=document.getElementById(id);return e?e.value:'';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}
function showModal(h){document.getElementById('modal').innerHTML=h;document.getElementById('modalBg').classList.add('show');}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});
function applyTheme(t){document.documentElement.dataset.theme=t;document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('psg_theme',t);}
function toggleTheme(){applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');}
applyTheme(localStorage.getItem('psg_theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));
document.getElementById('logoutBtn').addEventListener('click',logout);
document.getElementById('cloudBtn').addEventListener('click',openCloud);
document.getElementById('exportBtn').addEventListener('click',()=>{const b=new Blob([JSON.stringify(DB,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='psg-windows-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Backup downloaded');});
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);if(d.rates&&d.quotes){DB=d;save();go('dashboard');toast('Imported');}else toast('Invalid file');}catch(err){toast('Could not read file');}};rd.readAsText(f);});
cloudInit();
function autoPullIfEmpty(){ if(SB && (DB.quotes||[]).length===0) cloudPull(); }
/* restore session if present and still valid; sync cloud users/quotes on fresh devices */
(async function boot(){
  if(SB){ try{ await cloudPullAuth(); }catch(e){} }   // reflect cloud users/permissions/devices
  let sess=null; try{sess=JSON.parse(localStorage.getItem('psg_session'));}catch(e){}
  const u=sess&&findUser(sess.u);
  if(u && deviceApproved(u)){ ME=u; buildNav(); go('dashboard'); autoPullIfEmpty(); }
  else { renderLogin(); }
})();
</script>
</body>
